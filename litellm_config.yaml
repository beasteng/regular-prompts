# LiteLLM proxy config.
# n8n calls http://litellm:4000/v1/chat/completions (OpenAI-compatible).
# Change the model here; n8n workflows never need updating.

model_list:

  # --- Option A: OpenRouter (one key, many models) [DEFAULT] ---
  # - model_name: default
  #   litellm_params:
  #     model: openrouter/anthropic/claude-opus-4-8
  #     api_key: os.environ/OPENROUTER_API_KEY
  #     api_base: https://openrouter.ai/api/v1

  # --- Option B: Anthropic direct (claude-haiku-4.5) [previously enabled] ---
  # - model_name: default
  #   litellm_params:
  #     model: claude-haiku-4.5
  #     api_key: os.environ/ANTHROPIC_API_KEY

  # --- Option C: local Ollama (no external API key needed) ---
  # - model_name: default
  #   litellm_params:
  #     model: ollama/llama3
  #     api_base: http://ollama:11434

  # --- Option D: Free Gemini for googling (Google Search grounding) ---
  # - model_name: default
  #   litellm_params:
  #     model: gemini/gemini-2.5-flash
  #     api_key: os.environ/GEMINI_API_KEY
  #     google_search: true

  # --- Option E: Gemini Flash (Google AI Studio key) [ENABLED] ---
  - model_name: default
    litellm_params:
      model: gemini/gemini-3.5-flash
      api_key: os.environ/GEMINI_API_KEY
      web_search_options:
        search_context_size: "medium" # Options: "low", "medium", "high"
  - model_name: fallback
    litellm_params:
      model: gemini/gemini-3.1-flash-lite
      api_key: os.environ/GEMINI_API_KEY
      web_search_options:
        search_context_size: "medium" # Options: "low", "medium", "high"

litellm_settings:
  drop_params: true       # ignore unknown params silently
  request_timeout: 120

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY   # any random string; n8n sends this as Bearer token
  store_model_in_db: true
  store_prompts_in_spend_logs: true

router_settings:
  fallbacks: [{"default": ["fallback"]}]
