# LiteLLM proxy config.
# n8n calls http://litellm:4000/v1/chat/completions (OpenAI-compatible).
# Change the model here; n8n workflows never need updating.

model_list:

  # --- Option A: OpenRouter (one key, many models) [DEFAULT] ---
  - model_name: default
    litellm_params:
      model: openrouter/anthropic/claude-opus-4-8
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # --- Option B: Anthropic direct ---
  # - model_name: default
  #   litellm_params:
  #     model: claude-opus-4-8
  #     api_key: os.environ/ANTHROPIC_API_KEY

  # --- Option C: local Ollama (no external API key needed) ---
  # - model_name: default
  #   litellm_params:
  #     model: ollama/llama3
  #     api_base: http://ollama:11434

  # --- Option D: any other OpenRouter model ---
  # - model_name: default
  #   litellm_params:
  #     model: openrouter/mistralai/mixtral-8x7b-instruct
  #     api_key: os.environ/OPENROUTER_API_KEY
  #     api_base: https://openrouter.ai/api/v1

litellm_settings:
  drop_params: true       # ignore unknown params silently
  request_timeout: 120

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY   # any random string; n8n sends this as Bearer token