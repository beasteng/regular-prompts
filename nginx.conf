server {
    listen 80;
    server_name localhost;

    location / {
        # bucket path baked in; requests map to objects
        proxy_pass http://minio:9000/rendered-html$uri;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # so "/" and "/subdir/" resolve to index.html
        # (Nginx won't do this automatically over proxy)
    }

    # map directory-style paths to index.html
    location = / {
        proxy_pass http://minio:9000/rendered-html/index.html;
        proxy_set_header Host $host;
    }
}
