services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    ports: ["5678:5678"]
    env_file: [.env]
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://${N8N_HOST}:5678/
      - GENERIC_TIMEZONE=${TZ}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_DIAGNOSTICS_ENABLED=false
      # Allow nodes (e.g. the LiteLLM HTTP node) to read env vars in expressions
      # like $env.LITELLM_MASTER_KEY. n8n 2.29.x only honors this boolean flag
      # for the $env expression provider (no per-var whitelist in this version).
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    depends_on: [litellm]
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    ports: ["4000:4000"]
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    env_file: [.env]
    depends_on: [postgres]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: litellm_postgres
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm_pass
      POSTGRES_DB: litellm
    volumes:
      - litellm_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # --- optional: local models via Ollama (comment out if not needed) ---
  # ollama:
  #   image: ollama/ollama
  #   container_name: ollama
  #   ports: ["11434:11434"]
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   restart: unless-stopped

volumes:
  n8n_data:
  litellm_pgdata:
  # ollama_data: