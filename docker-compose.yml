services:
  minio:
    image: minio/minio
    container_name: minio
    ports: ["9000:9000", "9001:9001"]
    env_file: [.env]
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  s3-init:
    image: amazon/aws-cli:latest
    container_name: s3-init
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_DEFAULT_REGION: ${AWS_REGION}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -n "$$S3_ENDPOINT" ]; then
          ENDPOINT_FLAG="--endpoint-url $$S3_ENDPOINT"
        else
          ENDPOINT_FLAG=""
        fi

        echo "Waiting for S3 endpoint to be ready..."
        until aws s3api list-buckets $$ENDPOINT_FLAG > /dev/null 2>&1; do
          echo "  ...not ready yet, retrying in 3s"
          sleep 3
        done

        echo "S3 ready. Creating bucket '$$S3_BUCKET' if it does not exist..."
        if aws s3api head-bucket $$ENDPOINT_FLAG --bucket "$$S3_BUCKET" > /dev/null 2>&1; then
          echo "  Bucket '$$S3_BUCKET' already exists, skipping."
        else
          aws s3 mb $$ENDPOINT_FLAG "s3://$$S3_BUCKET" \
            $${AWS_REGION:+--region $$AWS_REGION}
          echo "  Bucket '$$S3_BUCKET' created successfully."
        fi
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    ports: ["5678:5678"]
    env_file: [.env]
    environment:
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://${N8N_HOST}:5678/
      GENERIC_TIMEZONE: ${TZ}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_API_KEY: ${N8N_API_KEY}
    depends_on:
      s3-init:
        condition: service_completed_successfully
      litellm:
        condition: service_started
    restart: unless-stopped
    volumes:
      - n8n_data:/home/node/.n8n

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    ports: ["4000:4000"]
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    env_file: [.env]
    depends_on: [postgres]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: litellm_postgres
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm_pass
      POSTGRES_DB: litellm
    volumes:
      - litellm_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  n8n_data:
  litellm_pgdata:
  minio_data:
